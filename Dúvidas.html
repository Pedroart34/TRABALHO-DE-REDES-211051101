<!DOCTYPE html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dúvidas e Problemas - Biblioteca Nona Arte</title>
    <link rel="stylesheet" href="estilo2.css"> 
	<link href="https://fonts.googleapis.com/css2?family=Bangers&family=Oswald:wght@400;700&display=swap" rel="stylesheet">
  </head>
  
    
	
<body>

   
    <div class="main-buttons-grid">
        <a href="index.html" class="comic-btn">Voltar à Página Inicial</a>
    </div>  

    <main class="content-container"> 
        <section class="book-card" style="text-align: left; max-width: 700px; margin: 0 auto; padding: 30px;">
            
           
            <div class="section-title-badge" style="margin-bottom: 20px;">
                <h1>Dúvidas e Problemas</h1>
            </div>
            
            <p style="font-size: 1.1rem; line-height: 1.5; margin-bottom: 25px; color: #333333;">
                Identifique-se pelo e-mail abaixo, selecione o assunto e descreva detalhadamente a sua dúvida ou o problema encontrado.
            </p>

           
            <form action="#" method="POST" class="comic-form">
                
                <div class="form-group">
                    <label for="email">Seu E-mail:</label>
                    <input type="email" id="email" name="email" placeholder="exemplo@email.com" required>
                </div>

                <div class="form-group">
                    <label for="assunto">Assunto:</label>
                    <select id="assunto" name="assunto" required>
                        <option value="" disabled selected>Selecione o motivo do contato...</option>
                        <option value="acervo">Dúvida sobre o acervo / obras</option>
                        <option value="cadastro">Problema com cadastro ou login</option>
                        <option value="devolucao">Prazos e devoluções de HQs</option>
                        <option value="tecnico">Problema técnico no site</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="mensagem">Sua Mensagem:</label>
                    <textarea id="mensagem" name="mensagem" rows="12"  placeholder="Escreva aqui..." required></textarea>
                </div>

               
                <button type="submit" class="comic-btn" style="width: 100%; margin-top: 10px;">Enviar</button>

            </form> 
        </section>
    </main> 

   
	
  </body>
</html>
