<!DOCTYPE HTML>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro - Biblioteca Nona Arte</title>
    <link rel="stylesheet" href="estilo2.css">
    <link href="https://fonts.googleapis.com/css2?family=Bangers&family=Oswald:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>

  
    <div class="main-buttons-grid">
        <a href="index.html" class="comic-btn">Voltar à Página Inicial</a>
    </div>  

    <main class="content-container"> 
       
        <section class="book-card" style="text-align: left; max-width: 900px; margin: 0 auto; padding: 30px;">
            
          
            <div class="section-title-badge" style="margin-bottom: 20px;">
                <h1>Criar Nova Conta</h1>
            </div>
            
            <p style="font-size: 1.1rem; line-height: 1.5; margin-bottom: 25px; color: #333333;">
                Preencha os campos abaixo com seus dados para realizar o cadastro na biblioteca e liberar o acesso ao acervo de HQs e Mangás.
            </p>

            
            <form action="#" method="POST" class="comic-form">
                
                
                <div class="form-group">
                    <label for="email">E-mail:</label>
                    <input type="email" id="email" name="email" placeholder="seu-email@exemplo.com" required>
                </div>

               
                <div class="form-group">
                    <label for="cpf">CPF:</label>
                    <input type="text" id="cpf" name="cpf" placeholder="000.000.000-00" pattern="\d{3}\.\d{3}\.\d{3}-\d{2}" title="Digite o CPF no formato 000.000.000-00" required>
                </div>

                
                <div class="form-group">
                    <label for="cep">CEP:</label>        
                    <input type="text" id="cep" name="cep" placeholder="00000-000" pattern="\d{5}-\d{3}" title="Digite o CEP no formato 00000-000" required>
                </div>

            
                <div class="form-group">
                    <label for="senha">Senha:</label>
                    <input type="password" id="senha" name="senha" placeholder="Digite sua senha" minlength="6" required>
                </div>

                
                <button type="submit" class="comic-btn" style="width: 100%; margin-top: 10px;">Finalizar Cadastro</button>

            </form> 
        </section>
    </main> 

    <h1>Faça Parte da Nona Arte!</h1>
</body>
</html>
